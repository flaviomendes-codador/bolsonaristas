name: 🦅 Monitor IA Feeder

on:
  schedule:
    # Todo dia às 11h UTC = 8h BRT
    - cron: '0 11 * * *'
  # Permite rodar manualmente pelo GitHub UI
  workflow_dispatch:

jobs:
  feeder:
    name: Processar PLs e Votações do Dia
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Instalar dependências
        run: bun install

      - name: Rodar Feeder IA
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run scripts/ai_feeder.ts

      - name: Notificar falha
        if: failure()
        run: |
          echo "❌ Feeder falhou em $(date)"
          # Aqui você pode adicionar notificação por email/Slack
